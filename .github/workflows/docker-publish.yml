name: Build and Push OpenClaw

on:
  push:
    branches: [ "main" ] # Dispara quando você der push no seu repo
  workflow_dispatch: # Permite rodar manualmente pelo botão no GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # AQUI VOCÊ USA SUA IMAGEM JÁ EXISTENTE
          tags: ramel/openclaw:latest
          # Isso usa sua imagem atual como cache, tornando o build muito mais rápido
          cache-from: type=registry,ref=ramel/openclaw:buildcache
          cache-to: type=inline
